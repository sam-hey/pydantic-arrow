name: Tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "py${{ matrix.python-version }} / ${{ matrix.deps }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Lower bounds: oldest Python + oldest supported pydantic + pyarrow
          - python-version: "3.11"
            deps: "min"
          # Latest deps: all supported Python versions (also covers upper bounds)
          - python-version: "3.11"
            deps: "latest"
          - python-version: "3.12"
            deps: "latest"
          - python-version: "3.13"
            deps: "latest"
    steps:
      - uses: actions/checkout@v4

      # setup-uv@v7: installs uv, pins Python version, enables built-in caching
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install project + test dependencies
        run: uv sync --locked --extra test

      - name: Override to minimum dependency versions
        if: matrix.deps == 'min'
        run: |
          uv pip install \
            "pydantic>=2.0,<2.1" \
            "pyarrow>=15.0,<16.0" \
            "typing-inspection>=0.4.0,<0.5.0"

      - name: Show installed versions
        run: |
          uv run python -c "
          import pydantic, pyarrow, typing_inspection
          print(f'pydantic={pydantic.__version__}')
          print(f'pyarrow={pyarrow.__version__}')
          print(f'typing-inspection={typing_inspection.__version__}')
          "

      - name: Run tests
        run: uv run pytest tests/ -n auto --cov --cov-report=xml --cov-report=term-missing

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-py${{ matrix.python-version }}-${{ matrix.deps }}
          path: coverage.xml
          include-hidden-files: true
