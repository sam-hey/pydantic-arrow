name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    concurrency:
      group: release
      cancel-in-progress: false   # never cancel a release in flight
    permissions:
      contents: write             # push version bump commit + tag
      id-token: write             # needed by PSR for GitHub release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # PSR needs full history to find last tag
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: python-semantic-release/python-semantic-release@v10
        id: release
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          build: "false"          # we build in the publish job
          changelog: "false"      # no CHANGELOG.md; release notes go into GitHub Release only
    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}

  publish:
    name: Publish to PyPI
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pydantic-arrow/
    permissions:
      id-token: write             # OIDC token for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}  # build the exact released tag

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
